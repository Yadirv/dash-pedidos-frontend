# netlify.toml — Configuración de despliegue para Dash_Pedidos Frontend
# Repo: dash-pedidos-frontend

[build]
  # Raíz del proyecto Vite/React
  base    = "comercial-pet-pro"
  command = "npm run build"
  publish = "dist"

# Redirect SPA: todas las rutas a index.html (evita 404 en navegación directa)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Cabeceras de seguridad
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# Cache largo para assets estáticos de Vite (hashed filenames)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache corto para data.json (se actualiza con cada deploy)
[[headers]]
  for = "/data.json"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"
